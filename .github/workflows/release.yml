name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build and release (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: windows-latest

    steps:
      # Tag pushes check out the pushed tag automatically; manual runs check out
      # the tag named in the input so we can release an already-existing tag.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = '${{ github.event.inputs.tag }}'.Trim()
          if ($tag -eq '') { $tag = '${{ github.ref_name }}' }
          $version = $tag -replace '^v', ''
          Write-Host "Tag: $tag  ->  Version: $version"
          "tag=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build, test and package
        shell: pwsh
        run: scripts/build.ps1 -Version "${{ steps.ver.outputs.version }}" -OutputPath publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GSYNC ${{ steps.ver.outputs.version }}
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: publish/GSYNC-${{ steps.ver.outputs.version }}-win-x64.zip
